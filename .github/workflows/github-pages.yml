name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          VITE_FIREBASE_API_KEY: "AIzaSyAw_NujJ3OZt5rzUNXMpYNWs0OqhORm2hc"
          VITE_FIREBASE_AUTH_DOMAIN: "hzuedoanmonhoc.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "hzuedoanmonhoc"
          VITE_FIREBASE_STORAGE_BUCKET: "hzuedoanmonhoc.firebasestorage.app"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "383134885021"
          VITE_FIREBASE_APP_ID: "1:383134885021:web:b90cd92db474335be66074"
          VITE_FIREBASE_MEASUREMENT_ID: "G-BRWXE3XGPW"

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
